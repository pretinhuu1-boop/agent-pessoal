<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0c" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Agente Netto" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />

    <!-- Splash screens (iOS) -->
    <meta name="apple-mobile-web-app-orientations" content="portrait-any" />

    <title>Agente Netto</title>

    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://api.anthropic.com" />

    <style>
      /* Splash screen while app loads */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #0a0a0c;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.3s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash svg { width: 64px; height: 64px; animation: pulse 1.5s ease-in-out infinite; }
      #splash p { color: #d4a243; font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 600; margin-top: 12px; letter-spacing: 0.5px; }
      @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="26" r="14" stroke="#d4a243" stroke-width="2.5"/>
        <path d="M24 40h16l-2 12H26z" fill="#d4a243" opacity="0.8"/>
        <rect x="25" y="54" width="14" height="2.5" rx="1.25" fill="#d4a243" opacity="0.5"/>
        <line x1="32" y1="6" x2="32" y2="10" stroke="#e8c675" stroke-width="2" stroke-linecap="round"/>
        <line x1="46" y1="14" x2="43" y2="17" stroke="#e8c675" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="14" x2="21" y2="17" stroke="#e8c675" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <p>Agente Netto</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash when app is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) { splash.classList.add('hide'); setTimeout(() => splash.remove(), 300); }
        }, 400);
      });
    </script>
  </body>
</html>
